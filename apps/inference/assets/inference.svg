<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Inference</title>
  <desc id="desc">Hexagonal inference network mark with layered signal paths.</desc>
  <defs>
    <clipPath id="hexClip">
      <path d="M100 10L178 55V145L100 190L22 145V55L100 10Z"/>
    </clipPath>
    <linearGradient id="hexFill" x1="25" y1="22" x2="175" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="0.45" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 98) rotate(90) scale(70)">
      <stop offset="0" stop-color="#F8FAFC" stop-opacity="0.92"/>
      <stop offset="0.32" stop-color="#67E8F9" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.28"/>
    </filter>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M100 10L178 55V145L100 190L22 145V55L100 10Z" fill="url(#hexFill)" filter="url(#softShadow)"/>
  <g clip-path="url(#hexClip)">
    <path d="M-6 152C34 115 62 129 98 92C131 58 161 61 206 28" stroke="#BAE6FD" stroke-opacity="0.18" stroke-width="18"/>
    <path d="M-12 52C37 79 56 55 96 82C139 111 160 92 214 124" stroke="#F8FAFC" stroke-opacity="0.11" stroke-width="14"/>
    <path d="M22 145L100 10L178 145H22Z" fill="url(#coreGlow)" opacity="0.8"/>
    <path d="M46 70H84L100 98L116 70H154" stroke="#E0F2FE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M46 130H84L100 102L116 130H154" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M100 44V156" stroke="#F8FAFC" stroke-opacity="0.62" stroke-width="4" stroke-linecap="round"/>
    <circle cx="46" cy="70" r="8" fill="#E0F2FE" filter="url(#nodeGlow)"/>
    <circle cx="154" cy="70" r="8" fill="#BFDBFE" filter="url(#nodeGlow)"/>
    <circle cx="46" cy="130" r="8" fill="#7DD3FC" filter="url(#nodeGlow)"/>
    <circle cx="154" cy="130" r="8" fill="#60A5FA" filter="url(#nodeGlow)"/>
    <circle cx="100" cy="100" r="16" fill="#F8FAFC"/>
    <circle cx="100" cy="100" r="8" fill="#1D4ED8"/>
    <path d="M100 10L178 55V145L100 190L22 145V55L100 10Z" stroke="#E0F2FE" stroke-opacity="0.9" stroke-width="3"/>
    <path d="M100 24L166 62V138L100 176L34 138V62L100 24Z" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
  </g>
</svg>
